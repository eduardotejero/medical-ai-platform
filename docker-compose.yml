version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: medicalai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/init.sql:/docker-entrypoint-initdb.d/02_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: medicalai_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  streamlit:
    build: ./backend
    container_name: medicalai_streamlit
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  mlflow:
    build: ./backend
    container_name: medicalai_mlflow
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    container_name: medicalai_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: