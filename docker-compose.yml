version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: medicalai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/init.sql:/docker-entrypoint-initdb.d/02_init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: medicalai_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  streamlit:
    build: ./backend
    container_name: medicalai_streamlit
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  mlflow:
    build: ./backend
    container_name: medicalai_mlflow
    command: mlflow ui --backend-store-uri sqlite:///mlflow.db --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app

  redis:
    image: redis:7-alpine
    container_name: medicalai_redis
    ports:
      - "6379:6379"

  cv-service:
    build: ./services/cv-service
    container_name: medicalai_cv
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AWS_DEFAULT_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/cv-service:/app

  cv-dashboard:
    build: ./services/cv-service
    container_name: medicalai_cv_dashboard
    command: streamlit run dashboard.py --server.port=8502 --server.address=0.0.0.0
    ports:
      - "8502:8502"
    depends_on:
      - cv-service
    environment:
      API_URL: http://cv-service:8001

  mirth:
    image: nextgenhealthcare/connect:latest
    container_name: medicalai_mirth
    environment:
      - DATABASE=postgres
      - DATABASE_URL=jdbc:postgresql://postgres:5432/medicalai
      - DATABASE_USERNAME=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy

  hl7-service:
    build: ./services/hl7-service
    container_name: medicalai_hl7
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      AWS_DEFAULT_REGION: eu-west-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  hl7-dashboard:
    build: ./services/hl7-service
    container_name: medicalai_hl7_dashboard
    command: streamlit run dashboard.py --server.port=8503 --server.address=0.0.0.0
    ports:
      - "8503:8503"
    depends_on:
      - hl7-service
    environment:
      API_URL: http://hl7-service:8002

  frontend:
    build: ./frontend
    container_name: medicalai_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
      - cv-service
      - hl7-service
          
volumes:
  postgres_data: